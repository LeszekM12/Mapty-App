<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="shortcut icon" type="image/png" href="/icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script defer src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js" integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew==" crossorigin=""></script>
  <script defer src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
  <script defer src="script.js"></script>
  <title>mapty // Map your workouts</title>
</head>
<body>
<div class="sidebar">
  <img src="logo.png" alt="Logo" class="logo" />

  <div class="route-controls">
    <button class="btn-route" id="btnRoute">🗺️ Wyznacz trasę A → B</button>
    <div class="route-info hidden" id="routeInfo">

      <!-- Tryb aktywności -->
      <div class="route-mode-selector">
        <button class="route-mode-btn route-mode-btn--active" data-mode="running" title="Bieg">🏃‍♂️</button>
        <button class="route-mode-btn" data-mode="cycling" title="Rower">🚴‍♀️</button>
        <button class="route-mode-btn" data-mode="walking" title="Marsz">🚶</button>
      </div>

      <div class="route-info__steps">
        <div class="route-info__step">
          <span class="route-info__badge route-info__badge--a">A</span>
          <span id="stepAText">Kliknij punkt startowy na mapie</span>
        </div>
        <div class="route-info__step">
          <span class="route-info__badge route-info__badge--b">B</span>
          <span id="stepBText">Kliknij punkt końcowy na mapie</span>
        </div>
      </div>
      <!-- Loading indicator -->
      <div class="route-loading hidden" id="routeLoading">
        <div class="route-loading__spinner">
          <div class="route-loading__dot"></div>
          <div class="route-loading__dot"></div>
          <div class="route-loading__dot"></div>
        </div>
        <span class="route-loading__text">Wyznaczam trasę...</span>
      </div>

      <div class="route-result hidden" id="routeResult">
        <div class="route-result__item">
          <span class="route-result__icon">📏</span>
          <span class="route-result__value" id="routeDist">—</span>
          <span class="route-result__unit">km</span>
        </div>
        <div class="route-result__item">
          <span class="route-result__icon">⏱</span>
          <span class="route-result__value" id="routeTime">—</span>
          <span class="route-result__unit">min</span>
        </div>
      </div>
      <button class="btn-route-cancel" id="btnCancelRoute">✕ Anuluj trasę</button>
    </div>
  </div>

  <ul class="workouts">
    <form class="form hidden">
      <div class="form__row">
        <label class="form__label">Type</label>
        <select class="form__input form__input--type">
          <option value="running">Running</option>
          <option value="cycling">Cycling</option>
        </select>
      </div>
      <div class="form__row">
        <label class="form__label">Distance</label>
        <input class="form__input form__input--distance" placeholder="km" />
      </div>
      <div class="form__row">
        <label class="form__label">Duration</label>
        <input class="form__input form__input--duration" placeholder="min" />
      </div>
      <div class="form__row">
        <label class="form__label">Cadence</label>
        <input class="form__input form__input--cadence" placeholder="step/min" />
      </div>
      <div class="form__row form__row--hidden">
        <label class="form__label">Elev Gain</label>
        <input class="form__input form__input--elevation" placeholder="meters" />
      </div>
      <button class="form__btn">OK</button>
    </form>
  </ul>

  <p class="copyright">
    &copy; Copyright by
    <a class="twitter-link" target="_blank" href="https://twitter.com/jonasschmedtman">Jonas Schmedtmann</a>.
    Use for learning or your portfolio. Don't use to teach. Don't claim as your own.
  </p>
</div>
<div id="map"></div>
</body>
</html>
