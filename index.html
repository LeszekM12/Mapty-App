<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="shortcut icon" type="image/png" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script defer src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js" integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew==" crossorigin=""></script>
  <script defer src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
  <script defer src="script.js"></script>
  <title>Mapty - Workouts App</title>
</head>
<body>
<div class="sidebar">
  <img src="logo.png" alt="Mapty logo" class="logo" />

  <!-- POI SEARCH -->
  <div class="poi-search">
    <div class="poi-search__bar">
      <input class="poi-search__input" id="poiInput" type="text" placeholder="Search nearby… (e.g. pharmacy, park)" />
      <button class="poi-search__btn" id="poiSearchBtn">🔍</button>
    </div>
    <div class="poi-filters" id="poiFilters">
      <button class="poi-filter-btn" data-query="grocery store">🛒 Store</button>
      <button class="poi-filter-btn" data-query="public toilet">🚻 WC</button>
      <button class="poi-filter-btn" data-query="pharmacy">💊 Pharmacy</button>
      <button class="poi-filter-btn" data-query="park">🌳 Park</button>
    </div>
    <ul class="poi-results hidden" id="poiResults"></ul>
  </div>

  <!-- LIVE TRACKING -->
  <div class="tracking-controls">
    <button class="btn-track" id="btnTrack">📍 Start tracking</button>
  </div>

  <!-- ROUTE PLANNER -->
  <div class="route-controls">
    <button class="btn-route" id="btnRoute">🗺️ Plan Route A → B</button>

    <div class="route-info hidden" id="routeInfo">

      <div class="route-mode-selector">
        <button class="route-mode-btn route-mode-btn--active" data-mode="running" title="Running">🏃‍♂️</button>
        <button class="route-mode-btn" data-mode="cycling" title="Cycling">🚴‍♀️</button>
        <button class="route-mode-btn" data-mode="walking" title="Walking">🚶</button>
      </div>

      <div class="route-info__steps">
        <div class="route-info__step">
          <span class="route-info__badge route-info__badge--a">A</span>
          <span id="stepAText">Click the start point on the map</span>
        </div>
        <div class="route-info__step">
          <span class="route-info__badge route-info__badge--b">B</span>
          <span id="stepBText">Click the end point on the map</span>
        </div>
      </div>

      <div class="route-loading hidden" id="routeLoading">
        <div class="route-loading__spinner">
          <div class="route-loading__dot"></div>
          <div class="route-loading__dot"></div>
          <div class="route-loading__dot"></div>
        </div>
        <span class="route-loading__text">Calculating route...</span>
      </div>

      <div class="route-result hidden" id="routeResult">
        <div class="route-result__item">
          <span class="route-result__icon">📏</span>
          <span class="route-result__value" id="routeDist">—</span>
          <span class="route-result__unit">km</span>
        </div>
        <div class="route-result__item">
          <span class="route-result__icon">⏱</span>
          <span class="route-result__value" id="routeTime">—</span>
          <span class="route-result__unit">min</span>
        </div>
      </div>

      <button class="btn-route-cancel" id="btnCancelRoute">✕ Cancel route</button>
    </div>
  </div>

  <!-- WORKOUT LIST -->
  <ul class="workouts">
    <form class="form hidden">
      <div class="form__row">
        <label class="form__label">Type</label>
        <select class="form__input form__input--type">
          <option value="running">Running</option>
          <option value="cycling">Cycling</option>
        </select>
      </div>
      <div class="form__row">
        <label class="form__label">Distance</label>
        <input class="form__input form__input--distance" placeholder="km" />
      </div>
      <div class="form__row">
        <label class="form__label">Duration</label>
        <input class="form__input form__input--duration" placeholder="min" />
      </div>
      <div class="form__row">
        <label class="form__label">Cadence</label>
        <input class="form__input form__input--cadence" placeholder="step/min" />
      </div>
      <div class="form__row form__row--hidden">
        <label class="form__label">Elev Gain</label>
        <input class="form__input form__input--elevation" placeholder="meters" />
      </div>
      <button class="form__btn">✓ Add Workout</button>
    </form>
  </ul>
</div>

<div id="map"></div>
</body>
</html>
